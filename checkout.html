<main class="container">

    <div class="card">

        <h2>Checkout</h2>

        <form id="checkoutForm">

            <input
                type="text"
                id="customerName"
                placeholder="Full Name"
                required>

            <input
                type="email"
                id="customerEmail"
                placeholder="Email Address"
                required>

            <input
                type="tel"
                id="customerPhone"
                placeholder="Phone Number"
                required>

            <input
                type="text"
                id="customerAddress"
                placeholder="Shipping Address"
                required>

            <button
                type="submit"
                class="btn">

                Place Order

            </button>

        </form>

    </div>

</main>
